<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7be0"/>
      <stop offset="1" stop-color="#12376e"/>
    </linearGradient>
    <linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="0.5" stop-color="#ffd23e"/>
      <stop offset="1" stop-color="#3ddc84"/>
    </linearGradient>
  </defs>

  <rect width="480" height="260" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.08">
    <line x1="0" y1="70" x2="480" y2="70"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="170" x2="480" y2="170"/>
    <line x1="0" y1="220" x2="480" y2="220"/>
  </g>

  <!-- sentiment emoji faces -->
  <g fill="none" stroke-width="2.4">
    <g transform="translate(120,58)" stroke="#3ddc84">
      <circle r="15" fill="#3ddc84" fill-opacity="0.14"/>
      <circle cx="-5" cy="-3" r="1.6" fill="#3ddc84" stroke="none"/>
      <circle cx="5" cy="-3" r="1.6" fill="#3ddc84" stroke="none"/>
      <path d="M -6 3 Q 0 10 6 3"/>
    </g>
    <g transform="translate(240,48)" stroke="#dfe7f5">
      <circle r="15" fill="#dfe7f5" fill-opacity="0.12"/>
      <circle cx="-5" cy="-3" r="1.6" fill="#dfe7f5" stroke="none"/>
      <circle cx="5" cy="-3" r="1.6" fill="#dfe7f5" stroke="none"/>
      <line x1="-6" y1="5" x2="6" y2="5"/>
    </g>
    <g transform="translate(360,58)" stroke="#ff6b6b">
      <circle r="15" fill="#ff6b6b" fill-opacity="0.14"/>
      <circle cx="-5" cy="-3" r="1.6" fill="#ff6b6b" stroke="none"/>
      <circle cx="5" cy="-3" r="1.6" fill="#ff6b6b" stroke="none"/>
      <path d="M -6 6 Q 0 -1 6 6"/>
    </g>
  </g>

  <!-- neutral baseline -->
  <line x1="30" y1="170" x2="450" y2="170" stroke="#ffffff" stroke-opacity="0.35" stroke-dasharray="4 5"/>

  <!-- sentiment timeline -->
  <polyline points="40,170 85,130 130,195 175,110 220,160 265,100 310,205 355,140 400,175 445,120"
            fill="none" stroke="url(#ln)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <g>
    <circle cx="85" cy="130" r="4.5" fill="#3ddc84"/>
    <circle cx="130" cy="195" r="4.5" fill="#ff6b6b"/>
    <circle cx="175" cy="110" r="4.5" fill="#3ddc84"/>
    <circle cx="220" cy="160" r="4.5" fill="#3ddc84"/>
    <circle cx="265" cy="100" r="4.5" fill="#3ddc84"/>
    <circle cx="310" cy="205" r="4.5" fill="#ff6b6b"/>
    <circle cx="355" cy="140" r="4.5" fill="#3ddc84"/>
    <circle cx="400" cy="175" r="4.5" fill="#ff6b6b"/>
    <circle cx="445" cy="120" r="4.5" fill="#3ddc84"/>
  </g>

  <!-- label -->
  <text x="30" y="26" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ffffff" fill-opacity="0.9" letter-spacing="1">VADER · sentiment over tweets</text>
</svg>
